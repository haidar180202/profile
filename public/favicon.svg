<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Premium Rounded Box Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Inner Subtle Accent Border -->
  <rect x="28" y="28" width="456" height="456" rx="108" fill="none" stroke="url(#accentGrad)" stroke-width="14" stroke-opacity="0.65" />
  <!-- Stylized High-Tech Monogram 'H' with Brackets Geometry -->
  <g filter="url(#glow)">
    <path d="M 172 148 L 172 364 M 172 256 L 340 256 M 340 148 L 340 364" stroke="url(#accentGrad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <!-- Tech Accent Dots / Nodes -->
    <circle cx="256" cy="132" r="14" fill="#38BDF8" />
    <circle cx="256" cy="380" r="14" fill="#6366F1" />
  </g>
</svg>
